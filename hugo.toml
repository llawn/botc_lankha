baseURL = 'https://example.org/'
title = 'Blood on the Clocktower - Rules'
theme = 'ananke'
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = true

[languages]
  [languages.en]
    locale = 'en-us'
    label = 'English'
    weight = 1
    contentDir = 'content/en'
    title = 'Blood on the Clocktower - Rules'

  [languages.fr]
    locale = 'fr-fr'
    label = 'Français'
    weight = 2
    contentDir = 'content/fr'
