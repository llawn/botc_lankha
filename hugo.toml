    url = '/en/characters/'
    weight = 20
  [[menu.main]]
    identifier = 'scenarios'
    name = 'Scenarios'
    url = '/en/scenarios/'
    weight = 30
  [[menu.main]]
    identifier = 'sheets'
    name = 'Sheets'
    url = '/en/sheets/'
    weight = 40
  [[menu.main]]
    identifier = 'toolbox'
