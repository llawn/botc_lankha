{{ define "main" }}
  <article class="pa3 pa4-ns nested-copy-line-height">
    <section class="cf ph3 ph5-l pv3 pv4-l f4 tc-l center measure-wide lh-copy nested-links botc-text">
      {{- .Content -}}
    </section>
    <section class="flex-ns mt4 flex-wrap">
      {{ range .Paginator.Pages }}
        <div class="w-100 w-30-l mb4 ph2">
          {{ .Render "summary" }}
        </div>
      {{ end }}
    </section>
    {{ partial "pagination.html" . }}
  </article>
{{ end }}
